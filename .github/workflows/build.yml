name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev-darkness-model-2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Restore cached dependencies
        id: restore-cached-dependencies
        uses: actions/cache/restore@v5
        with:
          path: |
            ./node_modules
            package-lock.json
          key: dependencies-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            dependencies-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install dependencies
        if: steps.restore-cached-dependencies.outputs.cache-hit != 'true'
        run: npm install

      - name: Cache dependencies
        id: cache-dependencies
        uses: actions/cache/save@v5
        if: steps.restore-cached-dependencies.outputs.cache-hit != 'true'
        with:
          path: |
            ./node_modules
            package-lock.json
          key: ${{ steps.restore-cached-dependencies.outputs.cache-primary-key }}

      - name: Build project
        run: webpack --mode=production
      
      - name: Copy icons to dist
        run: cp -r ./icons/ ./dist/icons/

      - name: Deploy with gh-pages
        run: |
          git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          npx gh-pages -d dist -u "github-actions-bot <support+actions@github.com>" -b dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}